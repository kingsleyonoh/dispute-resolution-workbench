openapi: 3.1.0
info:
  title: Dispute Resolution Workbench API
  version: 0.1.0
servers:
  - url: https://disputes.kingsleyonoh.com
  - url: http://localhost:3049
paths:
  /api/health:
    get:
      summary: Liveness health check
      operationId: getHealth
      responses:
        "200":
          description: App is up
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - up
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
